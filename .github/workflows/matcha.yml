name: Matcha Monitor

# Runs the stock check on a schedule (one-shot per run; cron drives the repetition).
on:
  schedule:
    # Every 15 minutes. Shorter intervals like */5 are throttled/skipped hardest by GitHub,
    # so */15 is actually more reliable. GitHub still delays schedules under load; spacing varies.
    - cron: "*/15 * * * *"
  workflow_dispatch:   # lets you trigger a run manually from the Actions tab
    inputs:
      profiles:
        description: "Comma-separated site profiles to run, e.g. koyamaen or horii,koyamaen,ippodo"
        required: false
        default: "horii,koyamaen,ippodo"
      test_telegram:
        description: "Send a test Telegram message and exit (verifies channel setup)"
        type: boolean
        default: false
      simulate_in_stock:
        description: "Pretend a product is in stock to exercise the alert path"
        type: boolean
        default: false
      debug:
        description: "More verbose logging (never prints secrets)"
        type: boolean
        default: false

# Don't let a slow run overlap with the next scheduled one.
concurrency:
  group: matcha-monitor
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Restore the "already alerted" state from the previous run so we don't
      # re-notify the same in-stock product every cycle. Picks the most recent cache.
      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: state
          key: matcha-alert-state-${{ github.run_id }}
          restore-keys: |
            matcha-alert-state-

      - name: Run monitor (one-shot)
        env:
          RUN_ONCE: "true"
          SINGLE_INSTANCE: "false"
          # On manual runs these come from the workflow_dispatch inputs above;
          # on scheduled runs the inputs are empty, so the defaults apply.
          SITE_PROFILES: ${{ github.event.inputs.profiles || 'horii,koyamaen,ippodo' }}
          TEST_TELEGRAM: ${{ github.event.inputs.test_telegram || 'false' }}
          SIMULATE_IN_STOCK: ${{ github.event.inputs.simulate_in_stock || 'false' }}
          DEBUG: ${{ github.event.inputs.debug || 'false' }}
          # Server has no desktop and an ephemeral cart — rely on Telegram only.
          ENABLE_LOCAL_NOTIFICATION: "false"
          AUTO_ADD_TO_CART: "false"
          ALERT_WHEN_ANY_IN_STOCK: "true"
          ALERT_ON_UNKNOWN_STOCK: "false"
          # Runner has proper CA certs, so verify TLS for both shops and Telegram.
          VERIFY_SSL: "true"
          TELEGRAM_VERIFY_SSL: "true"
          # Persisted across runs via the cache steps above/below.
          ALERT_STATE_FILE: "state/matcha_alert_state.json"
          # Login is ENABLED but LAZY: matcha_multi_monitor.py only logs in when a NEW
          # in-stock product appears (see check_site_once / site_has_unalerted_in_stock).
          # Empty stock = no login, and a product that stays in stock is not re-logged-in,
          # so we keep avoiding the "logging in every 15 min looks bot-like" risk while
          # refreshing Koyamaen's ship-to-Taiwan status in the SAME cycle stock is found.
          # (This replaces the old separate matcha_shipping.yml, now retired.)
          KOYAMAEN_ENABLE_LOGIN: "true"
          # Secrets — set these under repo Settings > Secrets and variables > Actions.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KOYAMAEN_LOGIN_EMAIL: ${{ secrets.KOYAMAEN_LOGIN_EMAIL }}
          KOYAMAEN_LOGIN_PASSWORD: ${{ secrets.KOYAMAEN_LOGIN_PASSWORD }}
        run: python matcha_multi_monitor.py

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: matcha-alert-state-${{ github.run_id }}
