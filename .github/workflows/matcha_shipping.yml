name: Matcha Shipping Check

# Logs into Koyamaen to refresh its "ship to Taiwan" status. Kept to ~twice a day so we
# are NOT logging in every 15 minutes (that looks bot-like and risks the account). The
# frequent, login-free stock checks live in matcha.yml. Both workflows run all three
# sites and share the same alert-state cache, so notification de-duplication stays
# consistent (each writes the full 3-site state; neither clobbers the other's keys).
#
# GitHub's own scheduler is fine here: at twice a day, occasional delay/skip doesn't
# matter (shipping availability changes rarely), so this one does NOT need Cloudflare.
on:
  schedule:
    # 01:07 & 13:07 UTC  ≈  09:07 & 21:07 Taiwan. Off the hour to dodge GitHub load spikes.
    - cron: "7 1,13 * * *"
  workflow_dispatch: {}   # manual run from the Actions tab

concurrency:
  group: matcha-shipping
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Share the same alert-state pool as matcha.yml so we don't re-notify the same
      # in-stock product. Picks the most recent cache with this prefix.
      - name: Restore alert state
        uses: actions/cache/restore@v4
        with:
          path: state
          key: matcha-alert-state-${{ github.run_id }}
          restore-keys: |
            matcha-alert-state-

      - name: Run monitor with Koyamaen login (one-shot)
        env:
          RUN_ONCE: "true"
          SINGLE_INSTANCE: "false"
          SITE_PROFILES: "horii,koyamaen,ippodo"
          ENABLE_LOCAL_NOTIFICATION: "false"
          AUTO_ADD_TO_CART: "false"
          ALERT_WHEN_ANY_IN_STOCK: "true"
          ALERT_ON_UNKNOWN_STOCK: "false"
          VERIFY_SSL: "true"
          TELEGRAM_VERIFY_SSL: "true"
          ALERT_STATE_FILE: "state/matcha_alert_state.json"
          # This is the ONLY workflow that logs in (Koyamaen only, for ship-to-Taiwan).
          # Global ENABLE_LOGIN stays false so Shopify sites don't attempt doomed logins.
          KOYAMAEN_ENABLE_LOGIN: "true"
          # Secrets — set these under repo Settings > Secrets and variables > Actions.
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KOYAMAEN_LOGIN_EMAIL: ${{ secrets.KOYAMAEN_LOGIN_EMAIL }}
          KOYAMAEN_LOGIN_PASSWORD: ${{ secrets.KOYAMAEN_LOGIN_PASSWORD }}
        run: python matcha_multi_monitor.py

      - name: Save alert state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: state
          key: matcha-alert-state-${{ github.run_id }}
